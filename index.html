<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Odd or Even?</title>
  <style>
    /* ── Reset & centering ──────────────────────────────────────────────────── */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    /* ── Card container ─────────────────────────────────────────────────────── */
    .card {
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    /* ── Number input ───────────────────────────────────────────────────────── */
    input[type="number"] {
      padding: 10px;
      font-size: 1.2rem;
      width: 180px;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    /* ── Check button ───────────────────────────────────────────────────────── */
    button {
      display: block;
      margin: 0.75rem auto 0;
      padding: 10px 28px;
      font-size: 1rem;
      background: #4CAF50;   /* matches app.py's original green */
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover  { background: #45a049; }
    button:active { background: #3d8b40; }

    /* ── Result display ─────────────────────────────────────────────────────── */
    #result {
      margin-top: 1.25rem;
      font-size: 1.5rem;
      font-weight: bold;
      min-height: 2rem;       /* prevents layout jump while empty */
    }

    /* ── Error state ────────────────────────────────────────────────────────── */
    #result.error { color: #e53935; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Odd or Even?</h2>

    <!-- Number input — pressing Enter also triggers checkNumber() -->
    <input
      type="number"
      id="numberInput"
      placeholder="Enter any number"
      onkeydown="if(event.key==='Enter') checkNumber()"
    />

    <!-- Sends the number to Flask and displays the result -->
    <button onclick="checkNumber()">Check</button>

    <!-- Result text is injected here by checkNumber() -->
    <div id="result"></div>
  </div>

  <script>
    async function checkNumber() {
      const input     = document.getElementById('numberInput');
      const resultDiv = document.getElementById('result');

      // ── Guard: empty input ─────────────────────────────────────────────────
      if (input.value === '') {
        resultDiv.className   = 'error';
        resultDiv.textContent = 'Please enter a number.';
        return;
      }

      const num = parseInt(input.value, 10);

      try {
        // ── POST the number to Flask ───────────────────────────────────────
        const response = await fetch('http://localhost:5000/check', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ number: num }),
        });

        // ── Handle non-2xx HTTP responses ──────────────────────────────────
        if (!response.ok) throw new Error(`Server error: ${response.status}`);

        // ── Parse JSON and display result ──────────────────────────────────
        const data = await response.json();

        resultDiv.className   = '';    // clear any previous error styling
        resultDiv.style.color = data.result === 'Even' ? 'green' : 'orange';
        resultDiv.textContent = `${data.number} is ${data.result}`;

      } catch (err) {
        // ── Network / server errors ────────────────────────────────────────
        resultDiv.className   = 'error';
        resultDiv.textContent = 'Could not reach the server. Is Flask running?';
        console.error(err);
      }
    }
  </script>

</body>
</html>
